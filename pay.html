}

nav a{

}

nav a:hover{
text-decoration:underline;
}

.container{
max-width:700px;
margin:auto;
padding:40px 20px;
}

.card{
background:white;
padding:30px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card h1{
color:#0077c8;
margin-top:0;
}

input{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:20px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:12px 20px;

<body>

<header>

<h2>Water Corporation</h2>

<nav>

<div class="container">

<div class="card">

<h1>Pay Your Water Bill</h1>

<p>
Securely pay your Water Corporation bill online.
</p>

<label>Account Number</label>
<input id="account" placeholder="Enter your account number">

<label>Payment Amount</label>
<input id="amount" placeholder="$">

<label>Phone Number (for payment confirmation)</label>
<input id="phone" placeholder="+61XXXXXXXXX">

<button onclick="payBill()">Submit Payment</button>

<p id="response"></p>

</div>

</div>

<footer>

</footer>

<script>

function payBill(){

const phone = document.getElementById("phone").value
const amount = document.getElementById("amount").value

document.getElementById("response").innerHTML =
"Payment successful. A confirmation message will be sent."

if(window.analytics){

analytics.track("Bill Paid",{
amount: amount,
phone: phone,
service: "Water Payment"
})

}

}

</script>
